services:
  - type: web
    name: scaling-sales-saas
    plan: free
    runtime: node
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
      - key: OWNER_WHATSAPP
