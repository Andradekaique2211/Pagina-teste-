services:
  - type: web
    name: scaling-sales-saas
    plan: free
    runtime: node
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        placeholder: "Defina sua senha de admin aqui"
      - key: OWNER_WHATSAPP
        placeholder: "Seu WhatsApp (Ex: 5516999999999)"
